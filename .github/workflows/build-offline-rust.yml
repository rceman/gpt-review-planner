name: Build Offline Rust Toolchain

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - VERSION
      - scripts/bootstrap-rustc.sh
      - scripts/build-offline-rust-bundle.sh
      - .github/workflows/build-offline-rust.yml
  workflow_dispatch:
    inputs:
      toolchain:
        description: Rust toolchain or channel
        required: false
        default: stable

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Resolve toolchain
        id: config
        shell: bash
        run: |
          toolchain='${{ inputs.toolchain }}'
          if [[ -z "$toolchain" ]]; then
            toolchain='stable'
          fi
          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"

      - name: Build official minimal offline bundle
        run: |
          bash scripts/build-offline-rust-bundle.sh \
            --toolchain '${{ steps.config.outputs.toolchain }}' \
            --output-dir dist

      - name: Prove strict offline bootstrap path
        shell: bash
        run: |
          bundle="$(find dist -maxdepth 1 -name 'rustc-lite-*.tar.zst' -print -quit)"
          test -n "$bundle"
          rm -rf /tmp/gpt-review-planner-rust-cache
          GPT_RUSTC_NO_NETWORK=1 bash scripts/bootstrap-rustc.sh \
            --force-managed \
            --no-network \
            --cache-dir /tmp/gpt-review-planner-rust-cache \
            --offline-bundle "$bundle" \
            -- bash -lc '
              rustc --version
              cargo --version
              rustc --edition=2021 --test \
                examples/rust-domain-feature/overlay/src/damage_kernel.rs \
                -o /tmp/damage-kernel-tests
              /tmp/damage-kernel-tests
            '

      - name: Upload downloadable workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustc-lite-linux-x86_64
          path: |
            dist/*.tar.zst
            dist/*.sha256
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Create or update GitHub Release for tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "$tag" \
              --generate-notes
          fi
